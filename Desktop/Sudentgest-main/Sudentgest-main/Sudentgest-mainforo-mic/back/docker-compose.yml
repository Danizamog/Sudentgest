version: "3.9"
services:
  gateway:
    build: ./Gateway
    ports:
      - "5001:5000"
  
  auth:
    build: ./Auth
    ports:
      - "5002:5000"
  
  users:
    build: ./Users
    ports:
      - "5003:5000"
  
  attendance:
    build: ./Attendance
    ports:
      - "5004:5000"
  
  grades:
    build: ./Grades
    ports:
      - "5005:5000"
  
  # 🆕 ACTUALIZAR EL SERVICIO FORUM
  forum:
    build: ./Forum
    ports:
      - "5006:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=studentgest_forum;Username=postgres;Password=studentgest123;
    depends_on:
      - postgres
  
  admin:
    build: ./Admin
    ports:
      - "5007:5000"
  
  # 🆕 AGREGAR SERVICIO POSTGRES
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: studentgest_forum
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: studentgest123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

# 🆕 AGREGAR VOLUMES
volumes:
  postgres_data: